kind = "web"
previewPath = "/"
title = "QA Pipeline"
version = "1.0.0"
id = "artifacts/qa-pipeline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19745

[services.development]
run = "pnpm --filter @workspace/qa-pipeline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qa-pipeline", "run", "build" ]
publicDir = "artifacts/qa-pipeline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19745"
BASE_PATH = "/"
