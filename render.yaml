services:
  - type: web
    name: qa-pipeline
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "3001"
      - key: BASE_PATH
        value: "/"
      - key: DATABASE_URL
        fromDatabase:
          name: qa-pipeline-db
          property: connectionString
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: LLM_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: BROWSERSTACK_USERNAME
        sync: false
      - key: BROWSERSTACK_ACCESS_KEY
        sync: false

databases:
  - name: qa-pipeline-db
    plan: free
    databaseName: qapipeline
    user: qapipeline
